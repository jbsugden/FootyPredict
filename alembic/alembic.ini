# Alembic configuration file for FootyPredict
# See https://alembic.sqlalchemy.org/ for full documentation

[alembic]
# Path to migration scripts, relative to this file
script_location = .

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for generated migration filenames (use UTC for consistency)
timezone = UTC

# Maximum length of the auto-generated "slug" in migration filenames
truncate_slug_length = 40

# Set to 'true' to run env.py's run_migrations_offline in "offline" mode
# without a database connection.
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a corresponding .py
# source file to be detected as revisions in the versions/ directory
# sourceless = false

# Version location. Can be a filesystem path, or a module path using
# the "module" prefix.
version_locations = %(here)s/versions

# The output encoding used by the template files as well as alembic's
# own output files.
output_encoding = utf-8

# SQLAlchemy URL — overridden at runtime by env.py reading from settings
sqlalchemy.url = sqlite+aiosqlite:///./footypredict.db


# -------------------------
# Logging configuration
# -------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
